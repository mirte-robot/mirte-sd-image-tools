name: Build and Upload


# build a single image, based on sbc and type inputs.
# uploads to artifacts and releases
# runs installer build if mirte-master
on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: main
  workflow_dispatch:

permissions:
    contents: write
  
jobs:
    build-and-push_overlay:
        # container:
        #   image: ubuntu:22.04
        #   options: --privileged
        runs-on: ubuntu-22.04
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                ref: ${{ inputs.branch }}
            - name: Create overlay image
              run: |
                sudo ./scripts/create_overlay.sh
            - name: Upload artifacts
              uses: ./.github/actions/upload
              with:
                folder: build
                name: overlay
                SURFDRIVE_USER: ${{ secrets.SURFDRIVE_USER }}
                SURFDRIVE_TOKEN: ${{ secrets.SURFDRIVE_TOKEN }}
                delete_directory: "true" # always delete the latest folder, since it should be replaced with the new one. This action is always faster, so let this delete the latest dir.